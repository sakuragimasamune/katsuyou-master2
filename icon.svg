  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.45"/>
  <text x="256" y="160" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" text-anchor="middle" fill="#ffb800" letter-spacing="8">CHAPTER</text>
  <text x="256" y="420" font-family="Arial Black, sans-serif" font-weight="900" font-size="380" text-anchor="middle" fill="url(#num)" filter="url(#glow)">2</text>
  <circle cx="80" cy="430" r="16" fill="#ff3d6a" opacity="0.85"/>
  <circle cx="432" cy="430" r="16" fill="#ffb800" opacity="0.85"/>
  <circle cx="80" cy="80" r="10" fill="#ce93d8" opacity="0.8"/>
  <circle cx="432" cy="80" r="10" fill="#ce93d8" opacity="0.8"/>
