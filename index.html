<style>
@import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Zen+Maru+Gothic:wght@400;700&family=Bungee+Shade&display=swap');
:root{--bg:#0a0a1a;--card-bg:#14142b;--accent:#ff3d6a;--accent2:#ffb800;--correct:#00e676;--wrong:#ff1744;--text:#e8e8f0;--text-dim:#8888aa;--glow:0 0 20px rgba(255,61,106,0.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;user-select:none;-webkit-user-select:none;}

#menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem 3rem;}
.menu-title{font-family:'Dela Gothic One',cursive;font-size:clamp(2rem,6vw,3.5rem);background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:1.5rem;margin-bottom:0.2rem;animation:titlePulse 2s ease-in-out infinite;text-align:center;line-height:1.1;}
.menu-chapter{font-family:'Dela Gothic One',cursive;font-size:clamp(1rem,3vw,1.4rem);color:#ce93d8;letter-spacing:4px;margin-bottom:0.3rem;text-shadow:0 0 15px rgba(206,147,216,0.4);}
@keyframes titlePulse{0%,100%{filter:brightness(1);transform:scale(1);}50%{filter:brightness(1.2);transform:scale(1.03);}}
.menu-sub{color:var(--text-dim);margin-bottom:1.5rem;font-size:0.95rem;}
.section-header{font-family:'Dela Gothic One',cursive;font-size:0.8rem;letter-spacing:2px;margin-top:1.5rem;margin-bottom:0.6rem;width:100%;max-width:420px;}
.section-header.vn-h{color:#ce93d8;}.section-header.train-h{color:#40c4ff;}
.level-list{display:flex;flex-direction:column;gap:0.6rem;width:100%;max-width:420px;}
.level-btn{background:var(--card-bg);border:2px solid #2a2a4a;border-radius:16px;padding:1rem 1.2rem;color:var(--text);font-family:'Zen Maru Gothic',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:left;position:relative;overflow:hidden;}
.level-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.level-btn.vn::before{background:linear-gradient(180deg,#ce93d8,#7c4dff);}
.level-btn.training::before{background:linear-gradient(180deg,#448aff,#40c4ff);}
.level-btn:hover,.level-btn:active{border-color:var(--accent);transform:translateX(6px);box-shadow:var(--glow);}
.level-btn .level-label{font-family:'Dela Gothic One',cursive;font-size:0.7rem;display:block;margin-bottom:3px;}
.level-btn.vn .level-label{color:#ce93d8;}.level-btn.training .level-label{color:#40c4ff;}
.level-btn.locked{opacity:0.35;pointer-events:none;border-color:#1a1a2a;}
.level-btn.locked::after{content:'🔒';position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:1.2rem;}
.unlock-bar{display:flex;gap:0.6rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;}
.unlock-btn{background:none;border:1px solid #2a2a4a;color:var(--text-dim);padding:0.4rem 1rem;border-radius:50px;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:0.75rem;transition:all 0.2s;}
.unlock-btn:active{transform:scale(0.95);}
.back-btn{position:absolute;top:1rem;left:1rem;background:none;border:1px solid #2a2a4a;color:var(--text-dim);padding:0.4rem 0.8rem;border-radius:8px;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:0.85rem;z-index:10;}

/* ===== VISUAL NOVEL ===== */
#vn{display:none;position:fixed;inset:0;z-index:60;background:linear-gradient(180deg,#0d0d2b 0%,#1a0a2e 50%,#0a0a1a 100%);flex-direction:column;}
.vn-scene{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 1rem 0;position:relative;min-height:0;}
.vn-chara{position:absolute;bottom:35%;left:50%;transform:translateX(-50%);text-align:center;}
.vn-chara-icon{font-size:4rem;animation:vnCharaBob 3s ease-in-out infinite;}
@keyframes vnCharaBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.vn-board{position:absolute;top:10%;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:1.2rem 1.5rem;max-width:90%;width:500px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;}
.vn-board-text{font-family:'Dela Gothic One',cursive;font-size:clamp(0.9rem,2.8vw,1.3rem);color:var(--accent2);line-height:1.8;white-space:pre-line;}
.vn-dialog{background:rgba(0,0,0,0.78);border-top:2px solid #3a3a5a;padding:1.2rem 1.5rem 1.8rem;min-height:160px;max-height:80vh;overflow-y:auto;position:relative;cursor:pointer;max-width:800px;margin:0 auto;width:100%;}
.vn-speaker{font-family:'Dela Gothic One',cursive;font-size:0.8rem;margin-bottom:0.4rem;letter-spacing:1px;}
.vn-speaker.sakuragi{color:#ce93d8;}
.vn-speaker.narrator{color:var(--text-dim);}
.vn-text{font-size:clamp(0.95rem,2.5vw,1.25rem);line-height:1.9;color:var(--text);min-height:3em;}
.vn-tap-hint{position:sticky;bottom:0;float:right;font-size:0.65rem;color:var(--text-dim);animation:vnBlink 1.5s infinite;margin-top:0.3rem;}
@keyframes vnBlink{0%,100%{opacity:0.3;}50%{opacity:1;}}
.vn-progress{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#ce93d8,#7c4dff);transition:width 0.3s;}
.vn-passage{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:0.8rem 1rem;text-align:center;font-size:clamp(1.1rem,3.2vw,1.4rem);margin-bottom:0.7rem;line-height:1.5;}
.vn-passage .target{color:var(--accent);font-weight:700;background:rgba(255,61,106,0.15);padding:0 0.25em;border-radius:4px;}

/* ===== 第二章クイズ（共通） ===== */
#ch2{display:none;min-height:100vh;flex-direction:column;padding:1rem;}
.ch2-header{text-align:center;padding:1rem 0 0.5rem;}
.ch2-tag{font-size:0.75rem;color:var(--text-dim);}
.ch2-progress{font-family:'Dela Gothic One',cursive;font-size:0.95rem;color:var(--accent2);margin-top:0.2rem;}
.ch2-passage{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:1.2rem 1rem;text-align:center;font-size:clamp(1.2rem,4vw,1.7rem);margin:1rem auto;max-width:600px;line-height:1.6;}
.ch2-passage .target{color:var(--accent);font-weight:700;background:rgba(255,61,106,0.15);padding:0.1em 0.3em;border-radius:6px;}
.ch2-step-label{font-family:'Dela Gothic One',cursive;font-size:clamp(1rem,3vw,1.3rem);color:var(--accent2);text-align:center;margin-bottom:0.6rem;animation:missionFlash 0.4s;}
@keyframes missionFlash{0%{opacity:0;transform:scale(1.3);}100%{opacity:1;transform:scale(1);}}
.ch2-options{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:0.5rem;max-width:600px;margin:0 auto 1rem;}
.ch2-options.t-form{grid-template-columns:repeat(3,1fr);max-width:400px;}
.ch2-options.t-type{grid-template-columns:repeat(3,1fr);max-width:400px;}
.ch2-opt{background:var(--card-bg);border:2px solid #2a2a4a;color:var(--text);padding:0.7rem 0.4rem;border-radius:10px;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(0.85rem,2.5vw,1.05rem);transition:all 0.15s;}
.ch2-opt:active{transform:scale(0.93);}
.ch2-opt.ch2-ok{border-color:var(--correct);background:rgba(0,230,118,0.2);color:var(--correct);}
.ch2-opt.ch2-ng{border-color:var(--wrong);background:rgba(255,23,68,0.2);color:var(--wrong);}
.ch2-answered{display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.6rem;}
.ch2-pill{background:rgba(255,255,255,0.05);border:1px solid #3a3a5a;padding:0.25rem 0.7rem;border-radius:20px;font-size:0.8rem;}
.ch2-pill.ok{border-color:var(--correct);color:var(--correct);}
.ch2-pill.ng{border-color:var(--wrong);color:var(--wrong);}

.ch2-listen{display:block;margin:1rem auto;background:linear-gradient(135deg,#ce93d8,#7c4dff);color:#fff;padding:0.9rem 2.2rem;border:none;border-radius:50px;cursor:pointer;font-family:'Dela Gothic One',cursive;font-size:1.05rem;letter-spacing:2px;box-shadow:0 4px 20px rgba(206,147,216,0.3);animation:listenPulse 1.5s ease-in-out infinite;}
.ch2-listen:active{transform:scale(0.95);}
@keyframes listenPulse{0%,100%{box-shadow:0 4px 20px rgba(206,147,216,0.3);}50%{box-shadow:0 4px 30px rgba(206,147,216,0.6);}}

/* ===== 解説パネル ===== */
.q3-expl{background:rgba(255,184,0,0.07);border:1px solid rgba(255,184,0,0.25);border-radius:14px;padding:1rem 1.1rem;margin:0.8rem auto;max-width:540px;text-align:left;animation:explIn 0.35s ease-out;}
@keyframes explIn{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}
.q3-commentary{font-size:clamp(0.9rem,2.4vw,1.05rem);line-height:1.95;color:var(--text);margin-bottom:0.8rem;padding-bottom:0.8rem;border-bottom:1px dashed rgba(255,255,255,0.18);}
.q3-memo{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;}
.q3-memo-line{font-size:clamp(0.95rem,2.5vw,1.1rem);line-height:2;color:var(--text);padding:0.15rem 0.2rem;border-left:3px solid rgba(255,184,0,0.35);padding-left:0.7rem;margin-bottom:0.25rem;}
.q3-memo-line .arrow{color:var(--accent2);font-weight:700;padding:0 0.15em;}
.q3-memo-line .concl{color:var(--accent);font-family:'Dela Gothic One',cursive;font-size:0.95em;letter-spacing:1px;}
.q3-answer{margin-top:0.9rem;text-align:center;color:var(--correct);font-family:'Dela Gothic One',cursive;font-size:clamp(1.1rem,3.2vw,1.4rem);letter-spacing:2px;padding:0.5rem;background:rgba(0,230,118,0.08);border-radius:10px;}

.ch2-next{display:block;margin:0.8rem auto;background:linear-gradient(135deg,var(--accent),#ff6b3d);color:#fff;padding:0.7rem 2rem;border:none;border-radius:50px;cursor:pointer;font-family:'Dela Gothic One',cursive;font-size:1.05rem;letter-spacing:2px;}
.ch2-next:active{transform:scale(0.95);}
.ch2-final{text-align:center;padding:2rem 1rem;}

.result-buttons{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;}
.result-btn{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:0.95rem;padding:0.7rem 1.8rem;border-radius:50px;cursor:pointer;border:none;transition:all 0.2s;}
.result-btn.retry{background:linear-gradient(135deg,var(--accent),#ff6b3d);color:#fff;}
.result-btn.menu{background:transparent;border:2px solid #3a3a5a;color:var(--text);}
.result-btn:active{transform:scale(0.95);}

.confetti-piece{position:fixed;z-index:151;pointer-events:none;}
.bg-particle{position:fixed;border-radius:50%;pointer-events:none;opacity:0.08;background:var(--accent);animation:floatP 15s infinite linear;}
@keyframes floatP{0%{transform:translateY(100vh);opacity:0;}10%{opacity:0.08;}90%{opacity:0.08;}100%{transform:translateY(-100px);opacity:0;}}
</style>
</head>

<script>

const AC=window.AudioContext||window.webkitAudioContext;let actx=null;

const ALL_UIDS=['lec1','p1a','p1b','lec2','p2a','p2b','p3a','p3b'];
const DEFAULT_U=['lec1','p3a','p3b'];
function getU(){try{const s=localStorage.getItem('katsuyou_ch2_u');if(!s)return[...DEFAULT_U];const a=JSON.parse(s);DEFAULT_U.forEach(d=>{if(!a.includes(d))a.push(d);});return a;}catch(e){return[...DEFAULT_U];}}
function saveU(a){try{localStorage.setItem('katsuyou_ch2_u',JSON.stringify(a));}catch(e){}}
function doUnlock(id){const u=getU();if(!u.includes(id)){u.push(id);saveU(u);}buildMenu();}
function isUL(id){return getU().includes(id);}
function unlockAll(){saveU([...ALL_UIDS]);buildMenu();showMenu();}
function resetLocks(){saveU([...DEFAULT_U]);buildMenu();window.scrollTo(0,0);}

// 3段階ピル表示
function pillsHtml(results){
  if(results.length===0)return '';
  const labels=['行','種類','形'];
  let h='<div class="ch2-answered">';
  for(let i=0;i<results.length;i++){
    const r=results[i];
    if(r.ok)h+=`<span class="ch2-pill ok">${labels[i]} ${r.val} ✓</span>`;
    else h+=`<span class="ch2-pill ng">${labels[i]} ${r.val} ✗→${r.correct}</span>`;
  }
  h+='</div>';
  return h;
}

// 解説パネル（メモ＋答え）
function explHtml(q){
  let h='<div class="q3-expl">';
  if(q.c){h+=`<div class="q3-commentary">${q.c}</div>`;}
  h+='<div class="q3-memo">';
  for(const line of q.m){
    // →で分割して後半を結論ハイライト
    const parts=line.split(' → ');
    if(parts.length>=2){
      const body=parts.slice(0,-1).join(' → ');
      const concl=parts[parts.length-1];
      h+=`<div class="q3-memo-line">${body}<span class="arrow"> → </span><span class="concl">${concl}</span></div>`;
    } else {
      h+=`<div class="q3-memo-line">${line}</div>`;
    }
  }
  h+='</div>';
  h+=`<div class="q3-answer">✅ ${q.a}</div>`;
  h+='</div>';
  return h;
}

  const prog=document.getElementById('vn-progress');
  const dialog=document.getElementById('vn-dialog');

  if(line.s==="桜木"){sp.textContent="桜木マサムネ";sp.className='vn-speaker sakuragi';chara.innerHTML='<div class="vn-chara-icon">🔥</div>';}
  else{sp.textContent="";sp.className='vn-speaker narrator';chara.innerHTML='';}

  // q3 ノード
  if(line.q3){
    dialog.onclick=null;
    document.querySelector('.vn-tap-hint').style.display='none';
    if(line.b){board.style.display='flex';boardTx.textContent=line.b;}else{board.style.display='none';}
    vnQ3State={q:line.q3,step:0,results:[],phase:'quiz',reaction:null,reactionOk:false};
    vnQ3Render();
    prog.style.width=((vnIdx+1)/vnScript.length*100)+'%';
    return;

  // 通常セリフ
  dialog.onclick=vnNext;

  if(line.b){board.style.display='flex';boardTx.textContent=line.b;}else{board.style.display='none';}
  prog.style.width=((vnIdx+1)/vnScript.length*100)+'%';
}

  const st=vnQ3State;
  const q=st.q;
  const tx=document.getElementById('vn-text');
  let html=`<div class="vn-passage">${q.p}</div>`;
  html+=pillsHtml(st.results);

  if(st.reaction){
    html+=`<div style="text-align:center;color:${st.reactionOk?'var(--correct)':'var(--wrong)'};font-weight:700;margin:0.4rem 0;font-size:clamp(0.95rem,2.5vw,1.15rem)">${st.reaction}</div>`;
    st.reaction=null;
  }

  if(st.phase==='quiz'){
    if(st.step<3){
      const s=Q3_STEPS[st.step];
      html+=`<div class="ch2-step-label">${s.label}</div>`;
      html+=`<div class="ch2-options ${s.cls}">${s.opts.map(o=>`<button class="ch2-opt" onclick="vnQ3Pick('${o}')">${o}</button>`).join('')}</div>`;
    } else {
      html+=`<button class="ch2-listen" onclick="event.stopPropagation();vnQ3Done()">▶ 解説を聞く</button>`;
    }
  } else {
    // explain phase
    html+=explHtml(q);
  }

  tx.innerHTML=html;
}

function vnQ3Pick(val){
  const st=vnQ3State;
  const q=st.q;
  const k=Q3_STEPS[st.step].key;
  const correct=val===q[k];
  const btns=document.querySelectorAll('.ch2-opt');
  btns.forEach(b=>{
    if(b.textContent===val)b.classList.add(correct?'ch2-ok':'ch2-ng');
    else if(b.textContent===q[k]&&!correct)b.classList.add('ch2-ok');
    b.onclick=null;
  });
  if(correct){playPing();st.reaction=pickR(Q3_OK);st.reactionOk=true;}
  else{playBuzz();st.reaction=pickR(Q3_NG);st.reactionOk=false;}
  st.results.push({val,correct:q[k],ok:correct});
  setTimeout(()=>{st.step++;vnQ3Render();},700);
}

function vnQ3Done(){
  // 解説フェーズへ遷移。タップで次の VN ノードへ進める。
  vnQ3State.phase='explain';
  vnQ3Render();
  document.getElementById('vn-dialog').onclick=vnNext;
  document.querySelector('.vn-tap-hint').style.display='block';
}

// ===== 練習クイズ =====
var ch2Pool=[],ch2Idx=0,ch2Cur=null,ch2Step=0,ch2Score=0,ch2Total=0,ch2Tag='';
var ch2Wrong=[],ch2Part='1a',ch2CurWrong=false,ch2Results=[],ch2Phase='quiz',ch2WrongSnapshot=[];
function startCh2(part,retryData){
  hideAll();document.getElementById('ch2').style.display='flex';
  // 第一部 26問 を 13+13 に分割、第二部 17問 を 9+8 に分割
  const sets={
    '1a':CH2_Q1.slice(0,13),
    '1b':CH2_Q1.slice(13),
    '2a':CH2_Q2.slice(0,9),
    '2b':CH2_Q2.slice(9),
    '3a':CH2_Q3.slice(0,10),
    '3b':CH2_Q3.slice(10),
  };
  const labels={'1a':'第一部 練習 前半','1b':'第一部 練習 後半','2a':'第二部 練習 前半','2b':'第二部 練習 後半','3a':'第三部 追加問題 前半','3b':'第三部 追加問題 後半'};
  ch2Tag=labels[part]||'練習';
  document.getElementById('ch2-tag').textContent=ch2Tag;
  ch2Pool=retryData?[...retryData]:[...sets[part]];
  ch2Idx=0;ch2Score=0;ch2Total=0;ch2Part=part;ch2Wrong=[];
  ch2NextQ();
}
function exitCh2(){showMenu();}
function ch2NextQ(){
  if(ch2Idx>=ch2Pool.length){ch2End();return;}
  ch2Cur=ch2Pool[ch2Idx];ch2Step=0;ch2Results=[];ch2CurWrong=false;ch2Phase='quiz';
  document.getElementById('ch2-progress').textContent=`問題 ${ch2Idx+1} / ${ch2Pool.length}`;
  ch2Render();
}
function ch2Render(){
  const body=document.getElementById('ch2-body');
  let html=`<div class="ch2-passage">${ch2Cur.p}</div>`;
  html+=pillsHtml(ch2Results);

  if(ch2Phase==='quiz'){
    if(ch2Step<3){
      const s=Q3_STEPS[ch2Step];
      html+=`<div class="ch2-step-label">${s.label}</div>`;
      html+=`<div class="ch2-options ${s.cls}">${s.opts.map(o=>`<button class="ch2-opt" onclick="ch2Pick('${o}')">${o}</button>`).join('')}</div>`;
    } else {
      html+=`<button class="ch2-listen" onclick="ch2ShowExpl()">▶ 解説を聞く</button>`;
    }
  } else {
    html+=explHtml(ch2Cur);
    html+=`<button class="ch2-next" onclick="ch2Idx++;ch2NextQ();">${ch2Idx+1>=ch2Pool.length?'結果を見る！':'次へ →'}</button>`;
  }
  body.innerHTML=html;
}
function ch2Pick(val){
  const k=Q3_STEPS[ch2Step].key;
  ch2Total++;
  const ok=val===ch2Cur[k];
  if(ok)ch2Score++;
  const btns=document.querySelectorAll('.ch2-opt');
  btns.forEach(b=>{
    if(b.textContent===val)b.classList.add(ok?'ch2-ok':'ch2-ng');
    else if(b.textContent===ch2Cur[k]&&!ok)b.classList.add('ch2-ok');
    b.onclick=null;
  });
  if(ok)playPing();else{playBuzz();ch2CurWrong=true;}
  ch2Results.push({val,correct:ch2Cur[k],ok});
  if(!ok&&!ch2Wrong.includes(ch2Cur))ch2Wrong.push(ch2Cur);
  setTimeout(()=>{ch2Step++;ch2Render();},700);
}
function ch2ShowExpl(){ch2Phase='explain';ch2Render();}
function ch2End(){
  const body=document.getElementById('ch2-body');
  const pct=Math.round(ch2Score/ch2Total*100);
  let msg='',icon='';
  if(pct>=90){msg='完璧だ！';icon='🏆';}
  else if(pct>=70){msg='よし、合格ライン！';icon='🎉';}
  else if(pct>=50){msg='半分は越えたな。もう一周しよう。';icon='💪';}
  else{msg='まだまだ。講義を見直すんだ。';icon='📖';}
  if(ch2Part==='1b'&&pct>=70)doUnlock('lec2');
  const isFinale=(ch2Part==='2b'&&pct>=90);
  ch2WrongSnapshot=[...ch2Wrong];
  let retryBtn='';
  if(ch2WrongSnapshot.length>0){
    retryBtn=`<button class="result-btn retry" style="background:linear-gradient(135deg,#e040fb,#7c4dff)" onclick="startCh2('${ch2Part}',ch2WrongSnapshot)">間違えた ${ch2WrongSnapshot.length} 問をもう一度</button>`;
  }
  const finaleHtml=isFinale?`<div style="font-family:'Bungee Shade',cursive;font-size:clamp(1.3rem,4.5vw,2rem);color:#e040fb;text-shadow:0 0 20px rgba(224,64,251,0.5);margin:0.8rem 0 0.3rem;letter-spacing:2px">第二章 完全制覇</div><div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:0.5rem">中間試験、見ててろ！</div>`:'';
  body.innerHTML=`<div class="ch2-final"><div style="font-size:4rem;margin-bottom:0.5rem">${icon}</div>${finaleHtml}<div style="font-family:'Dela Gothic One',cursive;font-size:2rem;color:var(--accent2);margin-bottom:0.5rem">正答率 ${pct}%</div><div style="font-size:0.9rem;color:var(--text-dim);margin-bottom:0.3rem">（正解 ${ch2Score} / 試行 ${ch2Total}）</div><div style="font-size:1rem;color:var(--text);margin:1rem 0 1.5rem;line-height:1.6">${msg}</div><div class="result-buttons">${retryBtn}<button class="result-btn retry" onclick="startCh2('${ch2Part}')">もう一回！</button><button class="result-btn menu" onclick="showMenu()">メニューへ</button></div></div>`;
  if(pct>=70){playOK();launchConfetti();if(isFinale){setTimeout(launchConfetti,600);setTimeout(launchConfetti,1200);}}else{playNG();}
}

// ===== EFFECTS =====
function launchConfetti(){const cols=['#ff3d6a','#ffb800','#00e676','#448aff','#e040fb','#ff6d00','#76ff03'];for(let i=0;i<60;i++){setTimeout(()=>{const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'vw';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.borderRadius=Math.random()>0.5?'50%':'2px';const s=Math.random()*8+6;p.style.width=s+'px';p.style.height=s+'px';document.body.appendChild(p);p.animate([{transform:'translateY(0) translateX(0) rotate(0deg)',opacity:1},{transform:`translateY(100vh) translateX(${(Math.random()-0.5)*200}px) rotate(${Math.random()*720}deg)`,opacity:0}],{duration:Math.random()*1500+1500,easing:'ease-out',fill:'forwards'}).onfinish=()=>p.remove();},i*30);}const f=document.createElement('div');f.style.cssText='position:fixed;inset:0;z-index:152;background:radial-gradient(circle,rgba(255,255,255,0.4) 0%,transparent 70%);pointer-events:none;';document.body.appendChild(f);f.animate([{opacity:1},{opacity:0}],{duration:600,fill:'forwards'}).onfinish=()=>f.remove();}
(function(){const c=document.getElementById('bg-particles');for(let i=0;i<8;i++){const p=document.createElement('div');p.className='bg-particle';const s=Math.random()*6+3;p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*15+'s';p.style.animationDuration=(Math.random()*10+12)+'s';c.appendChild(p);}})();
buildMenu();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
